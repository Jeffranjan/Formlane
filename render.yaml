# Render Blueprint – deploy the Express API as a free web service.
# Docs: https://docs.render.com/blueprint-spec
services:
  - type: web
    name: chaiforms-api
    runtime: node
    plan: free
    rootDir: ./apps/api
    buildCommand: cd ../.. && pnpm install --frozen-lockfile && pnpm --filter @repo/api build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: prod
      - key: PORT
        value: "8000"
      - key: DATABASE_URL
        sync: false # set manually in Render dashboard
      - key: BASE_URL
        sync: false # e.g. https://chaiforms-api.onrender.com
      - key: ALLOWED_ORIGINS
        sync: false # your Vercel frontend URL, e.g. https://chaiforms.vercel.app
